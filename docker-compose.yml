services:
  ppl:
    build: .
    container_name: ppl-c172-calculator
    restart: unless-stopped
    ports:
      - "8088:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
