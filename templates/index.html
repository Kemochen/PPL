<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C172N PPL Calculator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Cessna 172N</p>
        <h1 data-i18n="appTitle">PPL Performance Calculator</h1>
      </div>
      <div class="top-actions">
        <div class="badge">Takeoff - Landing - Cruise</div>
        <button class="language-toggle" type="button" aria-label="Switch language">
          <span class="toggle-option active" data-lang-pill="en">EN</span>
          <span class="toggle-option" data-lang-pill="zh">中</span>
        </button>
      </div>
    </header>

    <nav class="tabs" aria-label="Calculator tabs">
      <button class="tab active" type="button" data-tab="takeoff" data-i18n="takeoffTab">Takeoff</button>
      <button class="tab" type="button" data-tab="landing" data-i18n="landingTab">Landing</button>
      <button class="tab" type="button" data-tab="cruise" data-i18n="cruiseTab">Cruise</button>
    </nav>

    <section class="panel active" id="takeoff">
      <form class="calculator" data-endpoint="/api/takeoff">
        <div class="form-grid">
          <label><span data-i18n="weight">Weight</span><small>lb</small><input name="weight_lbs" type="number" step="1" value="2300" required></label>
          <label><span data-i18n="pressureAltitude">Pressure altitude</span><small>ft</small><input name="pressure_altitude_ft" type="number" step="1" value="2000" required></label>
          <label><span data-i18n="oat">Outside air temp</span><small>C</small><input name="oat_c" type="number" step="0.1" value="20" required></label>
          <label><span data-i18n="headwind">Headwind</span><small>kt</small><input name="headwind_kt" type="number" step="0.1" value="0"></label>
          <label><span data-i18n="tailwind">Tailwind</span><small>kt</small><input name="tailwind_kt" type="number" step="0.1" value="0"></label>
          <label class="check"><input name="grass" type="checkbox"><span data-i18n="grassRunway">Grass runway</span></label>
        </div>
        <button class="primary" type="submit" data-i18n="calculateTakeoff">Calculate takeoff distance</button>
      </form>
      <div class="result empty" aria-live="polite" data-i18n="resultHint">Enter conditions and calculate. Results will appear here.</div>
    </section>

    <section class="panel" id="landing">
      <form class="calculator" data-endpoint="/api/landing">
        <div class="form-grid">
          <label><span data-i18n="pressureAltitude">Pressure altitude</span><small>ft</small><input name="pressure_altitude_ft" type="number" step="1" value="2000" required></label>
          <label><span data-i18n="oat">Outside air temp</span><small>C</small><input name="oat_c" type="number" step="0.1" value="20" required></label>
          <label><span data-i18n="headwind">Headwind</span><small>kt</small><input name="headwind_kt" type="number" step="0.1" value="0"></label>
          <label><span data-i18n="tailwind">Tailwind</span><small>kt</small><input name="tailwind_kt" type="number" step="0.1" value="0"></label>
          <label class="check"><input name="grass" type="checkbox"><span data-i18n="grassRunway">Grass runway</span></label>
        </div>
        <button class="primary" type="submit" data-i18n="calculateLanding">Calculate landing distance</button>
      </form>
      <div class="result empty" aria-live="polite" data-i18n="resultHint">Enter conditions and calculate. Results will appear here.</div>
    </section>

    <section class="panel" id="cruise">
      <form class="calculator" data-endpoint="/api/cruise">
        <div class="form-grid">
          <label><span data-i18n="pressureAltitude">Pressure altitude</span><small>ft</small><input name="pressure_altitude_ft" type="number" step="1" value="6000" required></label>
          <label><span data-i18n="seaLevelOat">Sea-level OAT</span><small>C</small><input name="sea_level_oat_c" type="number" step="0.1" value="15" required></label>
          <label><span>RPM</span><small data-i18n="engineSpeed">engine speed</small><input name="rpm" type="number" step="10" value="2400" required></label>
        </div>
        <button class="primary" type="submit" data-i18n="calculateCruise">Calculate cruise performance</button>
      </form>
      <div class="result empty" aria-live="polite" data-i18n="resultHint">Enter conditions and calculate. Results will appear here.</div>
    </section>
  </main>

  <script>
    const translations = {
      en: {
        appTitle: "PPL Performance Calculator", takeoffTab: "Takeoff", landingTab: "Landing", cruiseTab: "Cruise",
        weight: "Weight", pressureAltitude: "Pressure altitude", oat: "Outside air temp", seaLevelOat: "Sea-level OAT",
        headwind: "Headwind", tailwind: "Tailwind", grassRunway: "Grass runway", engineSpeed: "engine speed",
        calculateTakeoff: "Calculate takeoff distance", calculateLanding: "Calculate landing distance", calculateCruise: "Calculate cruise performance",
        calculating: "Calculating...", resultHint: "Enter conditions and calculate. Results will appear here.",
        input_weight_lbs: "Input weight", selected_table_lbs: "POH table weight", ground_roll_ft: "Ground roll",
        total_clear_50ft_ft: "Total over 50 ft", total_to_clear_50ft_ft: "Total over 50 ft",
        lift_off_kias: "Lift-off speed", at_50ft_kias: "Speed at 50 ft", "Pressure altitude ft": "Pressure altitude",
        "ISA temp at altitude C": "ISA temp at altitude", "OAT at altitude C": "OAT at altitude",
        "Temp offset from ISA C": "Temp offset from ISA", "Percent BHP": "Power", KTAS: "True airspeed", GPH: "Fuel flow"
      },
      zh: {
        appTitle: "PPL \u6027\u80fd\u8ba1\u7b97\u5668", takeoffTab: "\u8d77\u98de", landingTab: "\u964d\u843d", cruiseTab: "\u5de1\u822a",
        weight: "\u91cd\u91cf", pressureAltitude: "\u538b\u529b\u9ad8\u5ea6", oat: "\u5916\u754c\u6e29\u5ea6", seaLevelOat: "\u6d77\u5e73\u9762\u6e29\u5ea6",
        headwind: "\u9006\u98ce", tailwind: "\u987a\u98ce", grassRunway: "\u8349\u5730\u8dd1\u9053", engineSpeed: "\u53d1\u52a8\u673a\u8f6c\u901f",
        calculateTakeoff: "\u8ba1\u7b97\u8d77\u98de\u8ddd\u79bb", calculateLanding: "\u8ba1\u7b97\u964d\u843d\u8ddd\u79bb", calculateCruise: "\u8ba1\u7b97\u5de1\u822a\u6027\u80fd",
        calculating: "\u8ba1\u7b97\u4e2d...", resultHint: "\u8f93\u5165\u6761\u4ef6\u540e\u70b9\u51fb\u8ba1\u7b97\uff0c\u7ed3\u679c\u4f1a\u663e\u793a\u5728\u8fd9\u91cc\u3002",
        input_weight_lbs: "\u8f93\u5165\u91cd\u91cf", selected_table_lbs: "POH \u8868\u683c\u91cd\u91cf", ground_roll_ft: "\u5730\u9762\u6ed1\u8dd1",
        total_clear_50ft_ft: "\u8d8a\u8fc7 50 ft \u603b\u8ddd\u79bb", total_to_clear_50ft_ft: "\u8d8a\u8fc7 50 ft \u603b\u8ddd\u79bb",
        lift_off_kias: "\u79bb\u5730\u901f\u5ea6", at_50ft_kias: "50 ft \u901f\u5ea6", "Pressure altitude ft": "\u538b\u529b\u9ad8\u5ea6",
        "ISA temp at altitude C": "\u9ad8\u5ea6 ISA \u6e29\u5ea6", "OAT at altitude C": "\u9ad8\u5ea6\u5916\u754c\u6e29\u5ea6",
        "Temp offset from ISA C": "ISA \u6e29\u5dee", "Percent BHP": "\u529f\u7387", KTAS: "\u771f\u7a7a\u901f", GPH: "\u6cb9\u8017"
      }
    };
    const units = { input_weight_lbs: "lb", selected_table_lbs: "lb", ground_roll_ft: "ft", total_clear_50ft_ft: "ft", total_to_clear_50ft_ft: "ft", lift_off_kias: "KIAS", at_50ft_kias: "KIAS", "Pressure altitude ft": "ft", "ISA temp at altitude C": "C", "OAT at altitude C": "C", "Temp offset from ISA C": "C", "Percent BHP": "%", KTAS: "kt", GPH: "gal/hr" };
    let currentLang = localStorage.getItem("pplLanguage") || "en";
    function t(key) { return translations[currentLang][key] || translations.en[key] || key; }
    function renderResult(resultBox, result) {
      resultBox.className = "result";
      resultBox.dataset.lastResult = JSON.stringify(result);
      resultBox.innerHTML = Object.entries(result).map(function(entry) {
        const key = entry[0];
        const value = entry[1];
        const unit = units[key] ? "<span>" + units[key] + "</span>" : "";
        return "<div class=\"metric\"><strong>" + t(key) + "</strong><b>" + value + " " + unit + "</b></div>";
      }).join("");
    }
    function applyLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("pplLanguage", lang);
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      document.querySelectorAll("[data-i18n]").forEach(function(node) { node.textContent = t(node.dataset.i18n); });
      document.querySelectorAll("[data-lang-pill]").forEach(function(node) { node.classList.toggle("active", node.dataset.langPill === lang); });
      document.querySelectorAll(".result.empty").forEach(function(node) { node.textContent = t("resultHint"); });
      document.querySelectorAll(".result[data-last-result]").forEach(function(node) { renderResult(node, JSON.parse(node.dataset.lastResult)); });
    }
    document.querySelector(".language-toggle").addEventListener("click", function() { applyLanguage(currentLang === "en" ? "zh" : "en"); });
    document.querySelectorAll(".tab").forEach(function(button) {
      button.addEventListener("click", function() {
        document.querySelectorAll(".tab, .panel").forEach(function(item) { item.classList.remove("active"); });
        button.classList.add("active");
        document.getElementById(button.dataset.tab).classList.add("active");
      });
    });
    document.querySelectorAll(".calculator").forEach(function(form) {
      form.addEventListener("submit", async function(event) {
        event.preventDefault();
        const resultBox = form.parentElement.querySelector(".result");
        resultBox.className = "result loading";
        resultBox.textContent = t("calculating");
        const response = await fetch(form.dataset.endpoint, { method: "POST", body: new FormData(form) });
        const payload = await response.json();
        if (!payload.ok) {
          resultBox.className = "result error";
          resultBox.textContent = payload.error;
          delete resultBox.dataset.lastResult;
          return;
        }
        renderResult(resultBox, payload.result);
      });
    });
    applyLanguage(currentLang);
  </script>
</body>
</html>
