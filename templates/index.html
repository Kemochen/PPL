<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C172N PPL Calculator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Cessna 172N</p>
        <h1>PPL Performance Calculator</h1>
      </div>
      <div class="badge">Takeoff - Landing - Cruise</div>
    </header>

    <nav class="tabs" aria-label="Calculator tabs">
      <button class="tab active" type="button" data-tab="takeoff">Takeoff</button>
      <button class="tab" type="button" data-tab="landing">Landing</button>
      <button class="tab" type="button" data-tab="cruise">Cruise</button>
    </nav>

    <section class="panel active" id="takeoff">
      <form class="calculator" data-endpoint="/api/takeoff">
        <div class="form-grid">
          <label>Weight <small>lb</small><input name="weight_lbs" type="number" step="1" value="2300" required></label>
          <label>Pressure altitude <small>ft</small><input name="pressure_altitude_ft" type="number" step="1" value="2000" required></label>
          <label>Outside air temp <small>C</small><input name="oat_c" type="number" step="0.1" value="20" required></label>
          <label>Headwind <small>kt</small><input name="headwind_kt" type="number" step="0.1" value="0"></label>
          <label>Tailwind <small>kt</small><input name="tailwind_kt" type="number" step="0.1" value="0"></label>
          <label class="check"><input name="grass" type="checkbox"> Grass runway</label>
        </div>
        <button class="primary" type="submit">Calculate takeoff distance</button>
      </form>
      <div class="result empty" aria-live="polite">Enter conditions and calculate. Results will appear here.</div>
    </section>

    <section class="panel" id="landing">
      <form class="calculator" data-endpoint="/api/landing">
        <div class="form-grid">
          <label>Pressure altitude <small>ft</small><input name="pressure_altitude_ft" type="number" step="1" value="2000" required></label>
          <label>Outside air temp <small>C</small><input name="oat_c" type="number" step="0.1" value="20" required></label>
          <label>Headwind <small>kt</small><input name="headwind_kt" type="number" step="0.1" value="0"></label>
          <label>Tailwind <small>kt</small><input name="tailwind_kt" type="number" step="0.1" value="0"></label>
          <label class="check"><input name="grass" type="checkbox"> Grass runway</label>
        </div>
        <button class="primary" type="submit">Calculate landing distance</button>
      </form>
      <div class="result empty" aria-live="polite">Enter conditions and calculate. Results will appear here.</div>
    </section>

    <section class="panel" id="cruise">
      <form class="calculator" data-endpoint="/api/cruise">
        <div class="form-grid">
          <label>Pressure altitude <small>ft</small><input name="pressure_altitude_ft" type="number" step="1" value="6000" required></label>
          <label>Sea-level OAT <small>C</small><input name="sea_level_oat_c" type="number" step="0.1" value="15" required></label>
          <label>RPM <small>engine speed</small><input name="rpm" type="number" step="10" value="2400" required></label>
        </div>
        <button class="primary" type="submit">Calculate cruise performance</button>
      </form>
      <div class="result empty" aria-live="polite">Enter conditions and calculate. Results will appear here.</div>
    </section>
  </main>

  <script>
    const labels = {
      input_weight_lbs: "Input weight", selected_table_lbs: "POH table weight",
      ground_roll_ft: "Ground roll", total_clear_50ft_ft: "Total over 50 ft",
      total_to_clear_50ft_ft: "Total over 50 ft", lift_off_kias: "Lift-off speed",
      at_50ft_kias: "Speed at 50 ft", "Pressure altitude ft": "Pressure altitude",
      "ISA temp at altitude C": "ISA temp at altitude", "OAT at altitude C": "OAT at altitude",
      "Temp offset from ISA C": "Temp offset from ISA", "Percent BHP": "Power",
      KTAS: "True airspeed", GPH: "Fuel flow"
    };
    const units = {
      input_weight_lbs: "lb", selected_table_lbs: "lb", ground_roll_ft: "ft",
      total_clear_50ft_ft: "ft", total_to_clear_50ft_ft: "ft", lift_off_kias: "KIAS",
      at_50ft_kias: "KIAS", "Pressure altitude ft": "ft", "ISA temp at altitude C": "C",
      "OAT at altitude C": "C", "Temp offset from ISA C": "C", "Percent BHP": "%",
      KTAS: "kt", GPH: "gal/hr"
    };

    document.querySelectorAll(".tab").forEach(function(button) {
      button.addEventListener("click", function() {
        document.querySelectorAll(".tab, .panel").forEach(function(item) { item.classList.remove("active"); });
        button.classList.add("active");
        document.getElementById(button.dataset.tab).classList.add("active");
      });
    });

    document.querySelectorAll(".calculator").forEach(function(form) {
      form.addEventListener("submit", async function(event) {
        event.preventDefault();
        const resultBox = form.parentElement.querySelector(".result");
        resultBox.className = "result loading";
        resultBox.textContent = "Calculating...";

        const response = await fetch(form.dataset.endpoint, { method: "POST", body: new FormData(form) });
        const payload = await response.json();

        if (!payload.ok) {
          resultBox.className = "result error";
          resultBox.textContent = payload.error;
          return;
        }

        resultBox.className = "result";
        resultBox.innerHTML = Object.entries(payload.result).map(function(entry) {
          const key = entry[0];
          const value = entry[1];
          const unit = units[key] ? "<span>" + units[key] + "</span>" : "";
          return "<div class="metric"><strong>" + (labels[key] || key) + "</strong><b>" + value + " " + unit + "</b></div>";
        }).join("");
      });
    });
  </script>
</body>
</html>
